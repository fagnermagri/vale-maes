<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arossi Estética - Voucher Especial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-wrapper">
        <div id="video-container">
            <video id="lacoVideo" playsinline preload="auto" poster="video/videoframe_0.jpg">
                <source src="video/laco.mp4" type="video/mp4">
                Seu navegador não suporta vídeos.
            </video>
            <div id="hint-text">Toque para abrir seu presente</div>
        </div>

        <div id="voucher-card">
            <div class="voucher-wrapper">
                <img src="video/convite.png" alt="Convite" class="voucher-img">
                <h2 id="guest-name">Mãe</h2>
            </div>
            
            <a id="whatsapp-link" href="#" class="btn-schedule">
                Agendar no WhatsApp
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
