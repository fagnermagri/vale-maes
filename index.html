<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arossi Estética - Voucher Especial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-wrapper">
        <div id="video-container">
            <video id="lacoVideo" playsinline preload="auto">
                <source src="video/laco.mp4" type="video/mp4">
                Seu navegador não suporta vídeos.
            </video>
            <div id="hint-text">Toque para abrir seu presente</div>
        </div>

        <div id="voucher-card">
            <h1>Vale Presente</h1>
            <p>
                Você acaba de receber um voucher especial para cuidar da sua beleza na
                <span class="studio-highlight">Arossi Estética e Saúde</span>
            </p>
            <a id="whatsapp-link" href="#" class="btn-schedule">
                Agendar no WhatsApp
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
